<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airbnb Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100">
    <div id="root">
        <h2 style="text-align:center; margin-top: 50px; font-family: sans-serif; color: #1E3A8A;">Φόρτωση συστήματος...</h2>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const SUPABASE_URL = 'https://lcxrcoyjykvcladfkgus.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxjeHJjb3lqeWt2Y2xhZGZrZ3VzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxMTg0NDcsImV4cCI6MjA5NDY5NDQ0N30.yA8x4RAbpKa6WM69v3r2YPWlJI8hhbnLnUA05pajtaA';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function App() {
            const [authStep, setAuthStep] = useState('LOGIN');
            const [bookings, setBookings] = useState([]);
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            
            // Καταστάσεις φόρμας
            const [showForm, setShowForm] = useState(false);
            const [editingId, setEditingId] = useState(null); // Αν έχει ID, κάνουμε Επεξεργασία, αλλιώς Νέα κράτηση

            // Ακριβή πεδία βάσης
            const [guestname, setGuestname] = useState('');
            const [idtype, setIdtype] = useState('ΑΦΜ');
            const [guestid, setGuestid] = useState('');
            const [country, setCountry] = useState('Ελλάδα');
            const [checkindate, setCheckindate] = useState('');
            const [checkintime, setCheckintime] = useState('');
            const [ischeckinunknown, setIscheckinunknown] = useState(true);
            const [checkoutdate, setCheckoutdate] = useState('');
            const [checkouttime, setCheckouttime] = useState('');
            const [ischeckoutunknown, setIscheckoutunknown] = useState(true);
            const [price, setPrice] = useState('');
            const [pax, setPax] = useState('2');
            const [pets, setPets] = useState(false);
            const [notes, setNotes] = useState('');
            const [isaadecomplete, setIsaadecomplete] = useState(false);

            const fetchBookings = () => {
                supabaseClient.from('bookings').select('*').order('checkindate', { ascending: true })
                .then(response => {
                    if (response.data) setBookings(response.data);
                })
                .catch(err => console.log("Σφάλμα ανάγνωσης"));
            };

            const handleLogin = () => {
                const u = username.trim().toLowerCase();
                const p = password.trim();
                // Και οι δύο μπαίνουν κανονικά και βλέπουν τα πάντα
                if ((u === 'admin' && p === 'admin') || (u === 'staff' && p === 'staff')) {
                    setAuthStep('APP'); fetchBookings();
                } else {
                    alert('Λάθος Στοιχεία.');
                }
            };

            const openNewForm = () => {
                setEditingId(null);
                setGuestname(''); setIdtype('ΑΦΜ'); setGuestid(''); setCountry('Ελλάδα');
                setCheckindate(''); setCheckintime(''); setIscheckinunknown(true);
                setCheckoutdate(''); setCheckouttime(''); setIscheckoutunknown(true);
                setPrice(''); setPax('2'); setPets(false); setNotes(''); setIsaadecomplete(false);
                setShowForm(true);
            };

            const openEditForm = (b) => {
                setEditingId(b.id);
                setGuestname(b.guestname || '');
                setIdtype(b.idtype || 'ΑΦΜ');
                setGuestid(b.guestid || '');
                setCountry(b.country || 'Ελλάδα');
                setCheckindate(b.checkindate || '');
                setCheckintime(b.checkintime || '');
                setIscheckinunknown(b.ischeckinunknown || false);
                setCheckoutdate(b.checkoutdate || '');
                setCheckouttime(b.checkouttime || '');
                setIscheckoutunknown(b.ischeckoutunknown || false);
                setPrice(b.price || '');
                setPax(b.pax || '2');
                setPets(b.pets || false);
                setNotes(b.notes || '');
                setIsaadecomplete(b.isaadecomplete || false);
                setShowForm(true);
            };

            const saveBooking = () => {
                if (!guestname || !checkindate || !checkoutdate) return alert("Το Όνομα, η Άφιξη και η Αναχώρηση είναι υποχρεωτικά.");
                
                const bookingData = {
                    guestname,
                    idtype,
                    guestid,
                    country,
                    checkindate,
                    checkintime: ischeckinunknown ? null : checkintime,
                    ischeckinunknown,
                    checkoutdate,
                    checkouttime: ischeckoutunknown ? null : checkouttime,
                    ischeckoutunknown,
                    price: Number(price) || 0,
                    pax: Number(pax) || 2,
                    pets,
                    notes,
                    isaadecomplete
                };

                let request;
                if (editingId) {
                    // Επεξεργασία υπάρχουσας κράτησης
                    request = supabaseClient.from('bookings').update(bookingData).eq('id', editingId);
                } else {
                    // Νέα κράτηση
                    request = supabaseClient.from('bookings').insert([bookingData]);
                }

                request.then(response => {
                    if (!response.error) {
                        setShowForm(false);
                        fetchBookings();
                        alert(editingId ? "Η κράτηση ενημερώθηκε!" : "Η κράτηση αποθηκεύτηκε!");
                    } else {
                        alert("Σφάλμα: " + response.error.message);
                    }
                }).catch(err => alert("Αποτυχία δικτύου"));
            };

            const deleteBooking = (id) => {
                if(window.confirm("Σίγουρα θέλετε να διαγράψετε οριστικά αυτή την κράτηση;")) {
                    supabaseClient.from('bookings').delete().eq('id', id)
                    .then(() => fetchBookings());
                }
            };

            if (authStep === 'LOGIN') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-blue-50">
                        <div className="bg-white p-8 rounded-xl shadow-lg w-full max-w-md text-center">
                            <div className="text-5xl mb-4">🏠</div>
                            <h1 className="text-3xl font-bold text-blue-900 mb-2">Airbnb Manager</h1>
                            <p className="text-gray-500 mb-6">Ενιαίο Σύστημα Διαχείρισης</p>
                            <input className="w-full p-3 border border-gray-300 rounded mb-4" placeholder="Όνομα Χρήστη" value={username} onChange={e=>setUsername(e.target.value)} />
                            <input className="w-full p-3 border border-gray-300 rounded mb-6" placeholder="Κωδικός" type="password" value={password} onChange={e=>setPassword(e.target.value)} />
                            <button className="w-full bg-blue-600 text-white font-bold p-3 rounded hover:bg-blue-700" onClick={handleLogin}>Είσοδος</button>
                        </div>
                    </div>
                );
            }

            if (showForm) {
                return (
                    <div className="min-h-screen p-4 pb-20 bg-gray-100">
                        <div className="max-w-md mx-auto bg-white p-6 rounded-xl shadow">
                            <h2 className="text-xl font-bold text-blue-900 mb-4">{editingId ? '✏️ Επεξεργασία Κράτησης' : '📝 Νέα Κράτηση'}</h2>
                            
                            <label className="block text-sm font-bold text-gray-700 mt-3">Ονοματεπώνυμο *</label>
                            <input className="w-full p-2 border border-gray-300 rounded mt-1" placeholder="Ονοματεπώνυμο" value={guestname} onChange={e=>setGuestname(e.target.value)} />

                            <div className="flex gap-2 mt-3">
                                <div className="w-1/3">
                                    <label className="block text-sm font-bold text-gray-700">Έγγραφο</label>
                                    <input className="w-full p-2 border border-gray-300 rounded mt-1" value={idtype} onChange={e=>setIdtype(e.target.value)} />
                                </div>
                                <div className="w-2/3">
                                    <label className="block text-sm font-bold text-gray-700">Αριθμός (ΑΦΜ/Διαβατήριο)</label>
                                    <input className="w-full p-2 border border-gray-300 rounded mt-1" value={guestid} onChange={e=>setGuestid(e.target.value)} />
                                </div>
                            </div>

                            <label className="block text-sm font-bold text-gray-700 mt-3">Χώρα</label>
                            <input className="w-full p-2 border border-gray-300 rounded mt-1" value={country} onChange={e=>setCountry(e.target.value)} />

                            <hr className="my-5 border-gray-200" />

                            <label className="block text-sm font-bold text-gray-700">Ημ. Άφιξης *</label>
                            <input className="w-full p-2 border border-gray-300 rounded mt-1 mb-2" type="date" value={checkindate} onChange={e=>setCheckindate(e.target.value)} />
                            
                            <div className="flex items-center gap-2 mb-2 p-2 bg-blue-50 rounded border border-blue-100">
                                <input type="checkbox" id="unkIn" checked={ischeckinunknown} onChange={e=>setIscheckinunknown(e.target.checked)} className="w-5 h-5"/>
                                <label htmlFor="unkIn" className="text-sm font-bold text-blue-800">Δεν γνωρίζουμε ώρα άφιξης ακόμα</label>
                            </div>
                            {!ischeckinunknown && (
                                <div>
                                    <label className="block text-sm text-gray-700">Ώρα Άφιξης</label>
                                    <input className="w-full p-2 border border-gray-300 rounded mt-1" type="time" value={checkintime} onChange={e=>setCheckintime(e.target.value)} />
                                </div>
                            )}

                            <hr className="my-5 border-gray-200" />

                            <label className="block text-sm font-bold text-gray-700">Ημ. Αναχώρησης *</label>
                            <input className="w-full p-2 border border-gray-300 rounded mt-1 mb-2" type="date" value={checkoutdate} onChange={e=>setCheckoutdate(e.target.value)} />

                            <div className="flex items-center gap-2 mb-2 p-2 bg-blue-50 rounded border border-blue-100">
                                <input type="checkbox" id="unkOut" checked={ischeckoutunknown} onChange={e=>setIscheckoutunknown(e.target.checked)} className="w-5 h-5"/>
                                <label htmlFor="unkOut" className="text-sm font-bold text-blue-800">Δεν γνωρίζουμε ώρα αναχώρησης</label>
                            </div>
                            {!ischeckoutunknown && (
                                <div>
                                    <label className="block text-sm text-gray-700">Ώρα Αναχώρησης</label>
                                    <input className="w-full p-2 border border-gray-300 rounded mt-1" type="time" value={checkouttime} onChange={e=>setCheckouttime(e.target.value)} />
                                </div>
                            )}

                            <hr className="my-5 border-gray-200" />

                            <div className="flex gap-2">
                                <div className="w-1/2">
                                    <label className="block text-sm font-bold text-gray-700 mt-3">Ποσό (€)</label>
                                    <input className="w-full p-2 border border-gray-300 rounded mt-1" type="number" value={price} onChange={e=>setPrice(e.target.value)} />
                                </div>
                                <div className="w-1/2">
                                    <label className="block text-sm font-bold text-gray-700 mt-3">Άτομα</label>
                                    <input className="w-full p-2 border border-gray-300 rounded mt-1" type="number" value={pax} onChange={e=>setPax(e.target.value)} />
                                </div>
                            </div>

                            <div className="flex items-center gap-2 mt-5">
                                <input type="checkbox" id="pets" checked={pets} onChange={e=>setPets(e.target.checked)} className="w-5 h-5"/>
                                <label htmlFor="pets" className="font-bold text-gray-700">Υπάρχει Κατοικίδιο</label>
                            </div>

                            <div className="flex items-center gap-2 mt-3">
                                <input type="checkbox" id="aade" checked={isaadecomplete} onChange={e=>setIsaadecomplete(e.target.checked)} className="w-5 h-5"/>
                                <label htmlFor="aade" className="font-bold text-gray-700">Καταχωρήθηκε στην ΑΑΔΕ</label>
                            </div>

                            <label className="block text-sm font-bold text-gray-700 mt-5">Σημειώσεις (Προαιρετικό)</label>
                            <textarea className="w-full p-2 border border-gray-300 rounded mt-1" rows="3" value={notes} onChange={e=>setNotes(e.target.value)}></textarea>

                            <button className="w-full bg-blue-600 text-white font-bold p-3 rounded mt-6" onClick={saveBooking}>💾 {editingId ? 'Αποθήκευση Αλλαγών' : 'Καταχώρηση Κράτησης'}</button>
                            <button className="w-full bg-gray-500 text-white font-bold p-3 rounded mt-2" onClick={()=>setShowForm(false)}>Ακύρωση</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gray-100 pb-20">
                    <div className="p-4 text-white flex justify-between items-center bg-blue-900 shadow-md">
                        <div className="font-bold text-lg">🏠 Airbnb Manager</div>
                        <button className="bg-red-500 px-3 py-1 rounded font-bold text-white text-sm" onClick={()=>setAuthStep('LOGIN')}>Έξοδος</button>
                    </div>

                    <div className="p-4">
                        <button className="w-full bg-blue-600 text-white font-bold p-4 rounded-lg shadow-lg flex justify-center items-center gap-2 text-lg" onClick={openNewForm}>
                            ➕ Προσθήκη Νέας Κράτησης
                        </button>
                    </div>

                    <div className="p-4 max-w-md mx-auto">
                        {bookings.length === 0 ? <p className="text-center text-gray-500 mt-10">Δεν υπάρχουν κρατήσεις ακόμα.</p> : null}
                        
                        {bookings.map(b => (
                            <div key={b.id} className="bg-white rounded-xl shadow-md mb-5 overflow-hidden border border-gray-200">
                                <div className="text-white text-xs font-bold text-center p-1 tracking-wider bg-gray-700 flex justify-between px-3">
                                    <span>ΕΠΙΒΕΒΑΙΩΜΕΝΗ ΚΡΑΤΗΣΗ</span>
                                    {b.isaadecomplete && <span className="text-green-300">✓ ΑΑΔΕ OK</span>}
                                </div>
                                <div className="p-4">
                                    <div className="flex border-b border-gray-100 pb-3 mb-3">
                                        <div className="flex-1 text-center border-r border-gray-100">
                                            <div className="text-xs text-gray-400 font-bold">ΑΦΙΞΗ</div>
                                            <div className="text-lg font-black text-green-700">{b.checkindate || '-'}</div>
                                            <div className="text-xs font-bold text-gray-500">{b.ischeckinunknown ? 'Άγνωστη ώρα' : (b.checkintime || '-')}</div>
                                        </div>
                                        <div className="flex-1 text-center">
                                            <div className="text-xs text-gray-400 font-bold">ΑΝΑΧΩΡΗΣΗ</div>
                                            <div className="text-lg font-black text-red-700">{b.checkoutdate || '-'}</div>
                                            <div className="text-xs font-bold text-gray-500">{b.ischeckoutunknown ? 'Άγνωστη ώρα' : (b.checkouttime || '-')}</div>
                                        </div>
                                    </div>
                                    
                                    <div className="mb-3">
                                        <div className="font-bold text-lg text-gray-800">👤 {b.guestname}</div>
                                        <div className="text-sm text-gray-500 mt-1">📄 {b.idtype}: {b.guestid || '-'}</div>
                                        <div className="text-sm text-gray-500">🌍 Χώρα: {b.country || '-'}</div>
                                    </div>

                                    <div className="flex justify-between p-2 rounded items-center bg-gray-50 mb-3">
                                        <span className="font-bold text-gray-700">👥 {b.pax} Άτομα</span>
                                        {b.pets && <span className="text-xs font-bold px-2 py-1 rounded bg-orange-100 text-orange-700">🐶 Κατοικίδιο</span>}
                                    </div>

                                    {b.notes && (
                                        <div className="mb-3 p-2 bg-yellow-50 text-sm text-yellow-800 border border-yellow-200 rounded">
                                            <strong>Σημείωση:</strong> {b.notes}
                                        </div>
                                    )}

                                    <div className="mt-3 p-3 rounded flex justify-between items-center bg-green-50 border border-green-100">
                                        <span className="font-bold text-xl text-green-700">💶 {b.price} €</span>
                                        <div className="flex gap-4">
                                            <button onClick={()=>openEditForm(b)} className="text-blue-500 text-2xl">✏️</button>
                                            <button onClick={()=>deleteBooking(b.id)} className="text-red-500 text-2xl">🗑️</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
