<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airbnb Manager Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Βιβλιοθήκη για εξαγωγή Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-100">
    <div id="root">
        <h2 style="text-align:center; margin-top: 50px; font-family: sans-serif; color: #1E3A8A;">Φόρτωση συστήματος...</h2>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const SUPABASE_URL = 'https://lcxrcoyjykvcladfkgus.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxjeHJjb3lqeWt2Y2xhZGZrZ3VzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxMTg0NDcsImV4cCI6MjA5NDY5NDQ0N30.yA8x4RAbpKa6WM69v3r2YPWlJI8hhbnLnUA05pajtaA';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function App() {
            const [authStep, setAuthStep] = useState('LOGIN');
            const [role, setRole] = useState(null);
            const [bookings, setBookings] = useState([]);
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [activeTab, setActiveTab] = useState('upcoming'); // 'current', 'upcoming', 'past', 'calendar', 'settings'
            
            // Τοπικοί κωδικοί
            const [adminCreds, setAdminCreds] = useState(() => JSON.parse(localStorage.getItem('adminCreds')) || { u: 'admin', p: 'admin' });
            const [staffCreds, setStaffCreds] = useState(() => JSON.parse(localStorage.getItem('staffCreds')) || { u: 'staff', p: 'staff' });

            // Φόρμα
            const [showForm, setShowForm] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [guestname, setGuestname] = useState('');
            const [idtype, setIdtype] = useState('ΑΦΜ');
            const [guestid, setGuestid] = useState('');
            const [country, setCountry] = useState('Ελλάδα');
            const [checkindate, setCheckindate] = useState('');
            const [checkintime, setCheckintime] = useState('');
            const [ischeckinunknown, setIscheckinunknown] = useState(true);
            const [checkoutdate, setCheckoutdate] = useState('');
            const [checkouttime, setCheckouttime] = useState('');
            const [ischeckoutunknown, setIscheckoutunknown] = useState(true);
            const [price, setPrice] = useState('');
            const [pax, setPax] = useState('2');
            const [pets, setPets] = useState(false);
            const [notes, setNotes] = useState('');
            const [isaadecomplete, setIsaadecomplete] = useState(false);

            const fetchBookings = () => {
                supabaseClient.from('bookings').select('*').order('checkindate', { ascending: true })
                .then(response => {
                    if (response.data) setBookings(response.data);
                })
                .catch(err => console.log("Σφάλμα ανάγνωσης"));
            };

            const handleLogin = () => {
                const u = username.trim();
                const p = password.trim();
                if (u === adminCreds.u && p === adminCreds.p) {
                    setRole('admin'); setAuthStep('APP'); fetchBookings();
                } else if (u === staffCreds.u && p === staffCreds.p) {
                    setRole('staff'); setAuthStep('APP'); fetchBookings();
                } else {
                    alert('Λάθος Στοιχεία.');
                }
            };

            const handleUpdateCreds = (newU, newP) => {
                if(!newU || !newP) return alert("Συμπληρώστε και τα δύο πεδία.");
                if(role === 'admin') {
                    const newCreds = {u: newU, p: newP};
                    setAdminCreds(newCreds);
                    localStorage.setItem('adminCreds', JSON.stringify(newCreds));
                } else {
                    const newCreds = {u: newU, p: newP};
                    setStaffCreds(newCreds);
                    localStorage.setItem('staffCreds', JSON.stringify(newCreds));
                }
                alert("Τα στοιχεία σύνδεσης ενημερώθηκαν επιτυχώς για αυτή τη συσκευή!");
            };

            const openNewForm = () => {
                setEditingId(null);
                setGuestname(''); setIdtype('ΑΦΜ'); setGuestid(''); setCountry('Ελλάδα');
                setCheckindate(''); setCheckintime(''); setIscheckinunknown(true);
                setCheckoutdate(''); setCheckouttime(''); setIscheckoutunknown(true);
                setPrice(''); setPax('2'); setPets(false); setNotes(''); setIsaadecomplete(false);
                setShowForm(true);
            };

            const openEditForm = (b) => {
                setEditingId(b.id);
                setGuestname(b.guestname || ''); setIdtype(b.idtype || 'ΑΦΜ'); setGuestid(b.guestid || ''); setCountry(b.country || 'Ελλάδα');
                setCheckindate(b.checkindate || ''); setCheckintime(b.checkintime || ''); setIscheckinunknown(b.ischeckinunknown || false);
                setCheckoutdate(b.checkoutdate || ''); setCheckouttime(b.checkouttime || ''); setIscheckoutunknown(b.ischeckoutunknown || false);
                setPrice(b.price || ''); setPax(b.pax || '2'); setPets(b.pets || false); setNotes(b.notes || ''); setIsaadecomplete(b.isaadecomplete || false);
                setShowForm(true);
            };

            const saveBooking = () => {
                if (!guestname || !checkindate || !checkoutdate) return alert("Το Όνομα, η Άφιξη και η Αναχώρηση είναι υποχρεωτικά.");
                const bookingData = {
                    guestname, idtype, guestid, country, checkindate, checkintime: ischeckinunknown ? null : checkintime,
                    ischeckinunknown, checkoutdate, checkouttime: ischeckoutunknown ? null : checkouttime, ischeckoutunknown,
                    price: Number(price) || 0, pax: Number(pax) || 2, pets, notes, isaadecomplete
                };
                let request = editingId ? supabaseClient.from('bookings').update(bookingData).eq('id', editingId) : supabaseClient.from('bookings').insert([bookingData]);
                request.then(response => {
                    if (!response.error) { setShowForm(false); fetchBookings(); } else alert("Σφάλμα: " + response.error.message);
                });
            };

            const deleteBooking = (id) => {
                if(window.confirm("Σίγουρα θέλετε να διαγράψετε οριστικά αυτή την κράτηση;")) {
                    supabaseClient.from('bookings').delete().eq('id', id).then(() => fetchBookings());
                }
            };

            const exportToExcel = () => {
                const dataToExport = bookings.map(b => ({
                    'Ονοματεπώνυμο': b.guestname,
                    'Τύπος Εγγράφου': b.idtype,
                    'Αριθμός Εγγράφου': b.guestid,
                    'Ημ. Άφιξης': b.checkindate,
                    'Ημ. Αναχώρησης': b.checkoutdate,
                    'Συνολικό Ποσό (€)': b.price
                }));
                const worksheet = window.XLSX.utils.json_to_sheet(dataToExport);
                const workbook = window.XLSX.utils.book_new();
                window.XLSX.utils.book_append_sheet(workbook, worksheet, "Κρατήσεις");
                window.XLSX.writeFile(workbook, "Airbnb_Kratiseis.xlsx");
            };

            // Φίλτρα Ημερομηνιών
            const todayStr = new Date().toISOString().split('T')[0];
            const currentBookings = bookings.filter(b => b.checkindate <= todayStr && b.checkoutdate >= todayStr);
            const upcomingBookings = bookings.filter(b => b.checkindate > todayStr);
            const pastBookings = bookings.filter(b => b.checkoutdate < todayStr);

            const renderBookingsList = (list) => {
                if(list.length === 0) return <p className="text-center text-gray-500 mt-10">Δεν βρέθηκαν κρατήσεις σε αυτή την κατηγορία.</p>;
                return list.map(b => (
                    <div key={b.id} className="bg-white rounded-xl shadow-md mb-5 overflow-hidden border border-gray-200">
                        <div className={`text-white text-xs font-bold text-center p-1 tracking-wider flex justify-between px-3 ${b.checkindate <= todayStr && b.checkoutdate >= todayStr ? 'bg-green-600' : 'bg-gray-700'}`}>
                            <span>{b.checkindate <= todayStr && b.checkoutdate >= todayStr ? '🟢 ΤΡΕΧΟΥΣΑ ΔΙΑΜΟΝΗ' : 'ΕΠΙΒΕΒΑΙΩΜΕΝΗ ΚΡΑΤΗΣΗ'}</span>
                            {b.isaadecomplete && <span className="text-green-300">✓ ΑΑΔΕ OK</span>}
                        </div>
                        <div className="p-4">
                            <div className="flex border-b border-gray-100 pb-3 mb-3">
                                <div className="flex-1 text-center border-r border-gray-100">
                                    <div className="text-xs text-gray-400 font-bold">ΑΦΙΞΗ</div>
                                    <div className="text-lg font-black text-green-700">{b.checkindate || '-'}</div>
                                </div>
                                <div className="flex-1 text-center">
                                    <div className="text-xs text-gray-400 font-bold">ΑΝΑΧΩΡΗΣΗ</div>
                                    <div className="text-lg font-black text-red-700">{b.checkoutdate || '-'}</div>
                                </div>
                            </div>
                            <div className="mb-3">
                                <div className="font-bold text-lg text-gray-800">👤 {b.guestname}</div>
                                <div className="text-sm text-gray-500 mt-1 flex justify-between items-center">
                                    <span>📄 {b.idtype}: {b.guestid || <span className="text-red-500 font-bold">ΕΚΚΡΕΜΕΙ</span>}</span>
                                    {role === 'staff' && !b.guestid && (
                                        <button onClick={()=>openEditForm(b)} className="bg-blue-100 text-blue-700 px-2 py-1 rounded text-xs font-bold">Προσθήκη Εγγράφου</button>
                                    )}
                                </div>
                            </div>
                            <div className="mt-3 p-3 rounded flex justify-between items-center bg-gray-50 border border-gray-100">
                                <span className="font-bold text-lg text-gray-700">💶 {b.price} €</span>
                                <div className="flex gap-4">
                                    <button onClick={()=>openEditForm(b)} className="text-blue-500 text-2xl">✏️</button>
                                    {role === 'admin' && <button onClick={()=>deleteBooking(b.id)} className="text-red-500 text-2xl">🗑️</button>}
                                </div>
                            </div>
                        </div>
                    </div>
                ));
            };

            if (authStep === 'LOGIN') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-blue-50">
                        <div className="bg-white p-8 rounded-xl shadow-lg w-full max-w-md text-center">
                            <h1 className="text-3xl font-bold text-blue-900 mb-6">Airbnb Manager Pro</h1>
                            <input className="w-full p-3 border border-gray-300 rounded mb-4" placeholder="Όνομα Χρήστη" value={username} onChange={e=>setUsername(e.target.value)} />
                            <input className="w-full p-3 border border-gray-300 rounded mb-6" placeholder="Κωδικός" type="password" value={password} onChange={e=>setPassword(e.target.value)} />
                            <button className="w-full bg-blue-600 text-white font-bold p-3 rounded hover:bg-blue-700" onClick={handleLogin}>Είσοδος</button>
                        </div>
                    </div>
                );
            }

            if (showForm) {
                // ... (Η φόρμα παραμένει ίδια με πριν, αλλά το admin μόνο μπορεί να σώσει νέα, το staff μόνο edits) ...
                return (
                    <div className="min-h-screen p-4 pb-20 bg-gray-100">
                        <div className="max-w-md mx-auto bg-white p-6 rounded-xl shadow">
                            <h2 className="text-xl font-bold text-blue-900 mb-4">{editingId ? '✏️ Επεξεργασία Κράτησης' : '📝 Νέα Κράτηση'}</h2>
                            <label className="block text-sm font-bold text-gray-700 mt-3">Ονοματεπώνυμο *</label>
                            <input className="w-full p-2 border border-gray-300 rounded mt-1" value={guestname} onChange={e=>setGuestname(e.target.value)} />
                            
                            <div className="flex gap-2 mt-3 p-3 bg-yellow-50 rounded border border-yellow-200">
                                <div className="w-1/3">
                                    <label className="block text-xs font-bold text-gray-700">Έγγραφο</label>
                                    <input className="w-full p-2 border border-gray-300 rounded mt-1" value={idtype} onChange={e=>setIdtype(e.target.value)} />
                                </div>
                                <div className="w-2/3">
                                    <label className="block text-xs font-bold text-red-600">Αριθμός (Check-in) *</label>
                                    <input className="w-full p-2 border border-red-300 rounded mt-1 bg-white" placeholder="Προσθήκη Αριθμού" value={guestid} onChange={e=>setGuestid(e.target.value)} />
                                </div>
                            </div>

                            <div className="flex gap-2 mt-3">
                                <div className="w-1/2">
                                    <label className="block text-sm font-bold text-gray-700">Ημ. Άφιξης *</label>
                                    <input className="w-full p-2 border border-gray-300 rounded mt-1" type="date" value={checkindate} onChange={e=>setCheckindate(e.target.value)} />
                                </div>
                                <div className="w-1/2">
                                    <label className="block text-sm font-bold text-gray-700">Ημ. Αναχώρησης *</label>
                                    <input className="w-full p-2 border border-gray-300 rounded mt-1" type="date" value={checkoutdate} onChange={e=>setCheckoutdate(e.target.value)} />
                                </div>
                            </div>
                            
                            <div className="flex gap-2 mt-3">
                                <div className="w-1/2">
                                    <label className="block text-sm font-bold text-gray-700">Ποσό (€)</label>
                                    <input className="w-full p-2 border border-gray-300 rounded mt-1" type="number" value={price} onChange={e=>setPrice(e.target.value)} />
                                </div>
                                <div className="w-1/2">
                                    <label className="block text-sm font-bold text-gray-700">Άτομα</label>
                                    <input className="w-full p-2 border border-gray-300 rounded mt-1" type="number" value={pax} onChange={e=>setPax(e.target.value)} />
                                </div>
                            </div>

                            <button className="w-full bg-blue-600 text-white font-bold p-3 rounded mt-6" onClick={saveBooking}>💾 {editingId ? 'Αποθήκευση Αλλαγών' : 'Καταχώρηση Κράτησης'}</button>
                            <button className="w-full bg-gray-500 text-white font-bold p-3 rounded mt-2" onClick={()=>setShowForm(false)}>Ακύρωση</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gray-100 pb-20">
                    <div className="p-4 text-white flex justify-between items-center bg-blue-900 shadow-md">
                        <div className="font-bold text-lg">🏠 Airbnb Pro ({role})</div>
                        <button className="bg-red-500 px-3 py-1 rounded font-bold text-white text-sm" onClick={()=>setAuthStep('LOGIN')}>Έξοδος</button>
                    </div>

                    {/* Tabs Navigation */}
                    <div className="flex overflow-x-auto bg-white shadow-sm border-b border-gray-200 hide-scrollbar">
                        <button onClick={()=>setActiveTab('current')} className={`px-4 py-3 text-sm font-bold whitespace-nowrap ${activeTab==='current'?'text-blue-600 border-b-2 border-blue-600':'text-gray-500'}`}>Τρέχουσες</button>
                        <button onClick={()=>setActiveTab('upcoming')} className={`px-4 py-3 text-sm font-bold whitespace-nowrap ${activeTab==='upcoming'?'text-blue-600 border-b-2 border-blue-600':'text-gray-500'}`}>Επερχόμενες</button>
                        <button onClick={()=>setActiveTab('past')} className={`px-4 py-3 text-sm font-bold whitespace-nowrap ${activeTab==='past'?'text-blue-600 border-b-2 border-blue-600':'text-gray-500'}`}>Προηγούμενες</button>
                        <button onClick={()=>setActiveTab('calendar')} className={`px-4 py-3 text-sm font-bold whitespace-nowrap ${activeTab==='calendar'?'text-blue-600 border-b-2 border-blue-600':'text-gray-500'}`}>Ημερολόγιο</button>
                        <button onClick={()=>setActiveTab('settings')} className={`px-4 py-3 text-sm font-bold whitespace-nowrap ${activeTab==='settings'?'text-blue-600 border-b-2 border-blue-600':'text-gray-500'}`}>Ρυθμίσεις</button>
                    </div>

                    <div className="p-4 max-w-md mx-auto">
                        
                        {/* Admin Action Buttons */}
                        {role === 'admin' && activeTab !== 'settings' && (
                            <div className="mb-4 flex gap-2">
                                <button className="flex-1 bg-blue-600 text-white font-bold p-3 rounded-lg shadow-md" onClick={openNewForm}>➕ Νέα Κράτηση</button>
                                <button className="flex-1 bg-green-600 text-white font-bold p-3 rounded-lg shadow-md" onClick={exportToExcel}>📊 Εξαγωγή Excel</button>
                            </div>
                        )}

                        {/* Staff Action Buttons */}
                        {role === 'staff' && activeTab !== 'settings' && (
                            <div className="mb-4">
                                <button className="w-full bg-green-600 text-white font-bold p-3 rounded-lg shadow-md" onClick={exportToExcel}>📊 Εξαγωγή Excel</button>
                            </div>
                        )}

                        {activeTab === 'current' && renderBookingsList(currentBookings)}
                        {activeTab === 'upcoming' && renderBookingsList(upcomingBookings)}
                        {activeTab === 'past' && renderBookingsList(pastBookings)}

                        {activeTab === 'calendar' && (
                            <div className="bg-white rounded-xl shadow-md p-4">
                                <h3 className="font-bold text-gray-700 mb-4 border-b pb-2">Όλες οι Κρατήσεις (Βάσει Άφιξης)</h3>
                                {bookings.map(b => (
                                    <div key={b.id} className="flex justify-between items-center py-2 border-b border-gray-100">
                                        <div>
                                            <div className="font-bold text-sm">{b.guestname}</div>
                                            <div className="text-xs text-gray-500">{b.checkindate} έως {b.checkoutdate}</div>
                                        </div>
                                        <div className="text-xs font-bold bg-blue-100 text-blue-800 px-2 py-1 rounded">{b.price}€</div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'settings' && (
                            <div className="bg-white rounded-xl shadow-md p-6 border border-gray-200">
                                <h3 className="font-bold text-lg text-gray-800 mb-4">Αλλαγή Κωδικών ({role})</h3>
                                <p className="text-xs text-gray-500 mb-4">Τα στοιχεία θα αλλάξουν μόνο για τη δική σας συσκευή.</p>
                                
                                <label className="block text-sm font-bold text-gray-700 mt-3">Νέο Όνομα Χρήστη</label>
                                <input id="newU" className="w-full p-2 border border-gray-300 rounded mt-1" defaultValue={role === 'admin' ? adminCreds.u : staffCreds.u} />
                                
                                <label className="block text-sm font-bold text-gray-700 mt-3">Νέος Κωδικός</label>
                                <input id="newP" type="password" className="w-full p-2 border border-gray-300 rounded mt-1" defaultValue={role === 'admin' ? adminCreds.p : staffCreds.p} />
                                
                                <button className="w-full bg-blue-800 text-white font-bold p-3 rounded mt-6" onClick={() => handleUpdateCreds(document.getElementById('newU').value, document.getElementById('newP').value)}>Αποθήκευση Στοιχείων</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</body>
</html>
