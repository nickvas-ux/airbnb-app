<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airbnb Manager Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-100">
    <div id="root">
        <h2 style="text-align:center; margin-top: 50px; font-family: sans-serif; color: #1E3A8A;">Φόρτωση συστήματος...</h2>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const SUPABASE_URL = 'https://lcxrcoyjykvcladfkgus.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxjeHJjb3lqeWt2Y2xhZGZrZ3VzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxMTg0NDcsImV4cCI6MjA5NDY5NDQ0N30.yA8x4RAbpKa6WM69v3r2YPWlJI8hhbnLnUA05pajtaA';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const MONTH_NAMES = ['Ιανουάριος', 'Φεβρουάριος', 'Μάρτιος', 'Απρίλιος', 'Μάιος', 'Ιούνιος', 'Ιούλιος', 'Αύγουστος', 'Σεπτέμβριος', 'Οκτώβριος', 'Νοέμβριος', 'Δεκέμβριος'];

        function App() {
            const [authStep, setAuthStep] = useState('LOGIN');
            const [role, setRole] = useState(null);
            const [bookings, setBookings] = useState([]);
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [activeTab, setActiveTab] = useState('upcoming'); 
            
            const [currentDate, setCurrentDate] = useState(new Date());
            
            const [adminCreds, setAdminCreds] = useState(() => JSON.parse(localStorage.getItem('adminCreds')) || { u: 'admin', p: 'admin' });
            const [staffCreds, setStaffCreds] = useState(() => JSON.parse(localStorage.getItem('staffCreds')) || { u: 'staff', p: 'staff' });

            const [showForm, setShowForm] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [guestname, setGuestname] = useState('');
            const [idtype, setIdtype] = useState('ΑΦΜ');
            const [guestid, setGuestid] = useState('');
            const [country, setCountry] = useState('Ελλάδα');
            const [checkindate, setCheckindate] = useState('');
            const [checkintime, setCheckintime] = useState('');
            const [ischeckinunknown, setIscheckinunknown] = useState(true);
            const [checkoutdate, setCheckoutdate] = useState('');
            const [checkouttime, setCheckouttime] = useState('');
            const [ischeckoutunknown, setIscheckoutunknown] = useState(true);
            const [price, setPrice] = useState('');
            const [pax, setPax] = useState('2');
            const [pets, setPets] = useState(false);
            const [notes, setNotes] = useState('');
            const [isaadecomplete, setIsaadecomplete] = useState(false);

            // Modals States
            const [selectedCalendarBooking, setSelectedCalendarBooking] = useState(null);
            const [quickCheckInBooking, setQuickCheckInBooking] = useState(null);
            const [quickId, setQuickId] = useState('');

            const fetchBookings = () => {
                supabaseClient.from('bookings').select('*').order('checkindate', { ascending: true })
                .then(response => {
                    if (response.data) setBookings(response.data);
                })
                .catch(err => console.log("Σφάλμα ανάγνωσης"));
            };

            const handleLogin = () => {
                const u = username.trim();
                const p = password.trim();
                if (u === adminCreds.u && p === adminCreds.p) {
                    setRole('admin'); setAuthStep('APP'); fetchBookings();
                } else if (u === staffCreds.u && p === staffCreds.p) {
                    setRole('staff'); setAuthStep('APP'); fetchBookings();
                } else {
                    alert('Λάθος Στοιχεία.');
                }
            };

            const handleUpdateCreds = (newU, newP) => {
                if(!newU || !newP) return alert("Συμπληρώστε και τα δύο πεδία.");
                const newCreds = {u: newU, p: newP};
                if(role === 'admin') {
                    setAdminCreds(newCreds); localStorage.setItem('adminCreds', JSON.stringify(newCreds));
                } else {
                    setStaffCreds(newCreds); localStorage.setItem('staffCreds', JSON.stringify(newCreds));
                }
                alert("Τα στοιχεία σύνδεσης ενημερώθηκαν επιτυχώς!");
            };

            const saveBooking = () => {
                if (!guestname || !checkindate || !checkoutdate) return alert("Το Όνομα, η Άφιξη και η Αναχώρηση είναι υποχρεωτικά.");
                const bookingData = {
                    guestname, idtype, guestid, country, checkindate, checkintime: ischeckinunknown ? null : checkintime,
                    ischeckinunknown, checkoutdate, checkouttime: ischeckoutunknown ? null : checkouttime, ischeckoutunknown,
                    price: Number(price) || 0, pax: Number(pax) || 2, pets, notes, isaadecomplete
                };
                let request = editingId ? supabaseClient.from('bookings').update(bookingData).eq('id', editingId) : supabaseClient.from('bookings').insert([bookingData]);
                request.then(response => {
                    if (!response.error) { setShowForm(false); fetchBookings(); } 
                    else alert("Σφάλμα: " + response.error.message);
                });
            };

            const deleteBooking = (id) => {
                if(window.confirm("Σίγουρα θέλετε να διαγράψετε οριστικά αυτή την κράτηση;")) {
                    supabaseClient.from('bookings').delete().eq('id', id).then(() => fetchBookings());
                }
            };

            const saveQuickCheckIn = () => {
                if(!quickId) return alert("Παρακαλώ εισάγετε αριθμό.");
                supabaseClient.from('bookings').update({ guestid: quickId }).eq('id', quickCheckInBooking.id)
                .then(res => {
                    if(!res.error) { setQuickCheckInBooking(null); setQuickId(''); fetchBookings(); alert("Έγγραφο αποθηκεύτηκε!"); }
                });
            };

            const exportToExcel = () => {
                const dataToExport = bookings.map(b => ({
                    'Ονοματεπώνυμο': b.guestname, 'Τύπος Εγγράφου': b.idtype, 'Αριθμός Εγγράφου': b.guestid,
                    'Χώρα': b.country, 'Ημ. Άφιξης': b.checkindate, 'Ημ. Αναχώρησης': b.checkoutdate,
                    'Ποσό (€)': b.price, 'Άτομα': b.pax, 'Κατοικίδιο': b.pets ? 'Ναι':'Όχι'
                }));
                const ws = window.XLSX.utils.json_to_sheet(dataToExport);
                const wb = window.XLSX.utils.book_new();
                window.XLSX.utils.book_append_sheet(wb, ws, "Κρατήσεις");
                window.XLSX.writeFile(wb, "Airbnb_Kratiseis.xlsx");
            };

            const openEditForm = (b) => {
                setEditingId(b.id); setGuestname(b.guestname || ''); setIdtype(b.idtype || 'ΑΦΜ'); setGuestid(b.guestid || ''); setCountry(b.country || 'Ελλάδα');
                setCheckindate(b.checkindate || ''); setCheckintime(b.checkintime || ''); setIscheckinunknown(b.ischeckinunknown !== undefined ? b.ischeckinunknown : true);
                setCheckoutdate(b.checkoutdate || ''); setCheckouttime(b.checkouttime || ''); setIscheckoutunknown(b.ischeckoutunknown !== undefined ? b.ischeckoutunknown : true);
                setPrice(b.price || ''); setPax(b.pax || '2'); setPets(b.pets || false); setNotes(b.notes || ''); setIsaadecomplete(b.isaadecomplete || false);
                setShowForm(true);
            };

            const todayStr = new Date().toISOString().split('T')[0];
            const currentBookings = bookings.filter(b => b.checkindate <= todayStr && b.checkoutdate >= todayStr);
            const upcomingBookings = bookings.filter(b => b.checkindate > todayStr);
            const pastBookings = bookings.filter(b => b.checkoutdate < todayStr);

            // Βοηθητική για υπολογισμό διανυκτερεύσεων
            const getNights = (inDate, outDate) => {
                const diff = new Date(outDate) - new Date(inDate);
                return diff > 0 ? diff / (1000 * 60 * 60 * 24) : 0;
            };

            const renderBookingsList = (list) => {
                if(list.length === 0) return <p className="text-center text-gray-500 mt-10">Δεν βρέθηκαν κρατήσεις.</p>;
                return list.map(b => (
                    <div key={b.id} className="bg-white rounded-xl shadow-md mb-5 overflow-hidden border border-gray-200">
                        <div className={`text-white text-xs font-bold text-center p-1 flex justify-between px-3 ${b.checkindate <= todayStr && b.checkoutdate >= todayStr ? 'bg-green-600' : 'bg-gray-700'}`}>
                            <span>{b.checkindate <= todayStr && b.checkoutdate >= todayStr ? '🟢 ΤΡΕΧΟΥΣΑ ΔΙΑΜΟΝΗ' : 'ΚΡΑΤΗΣΗ'}</span>
                            {b.isaadecomplete ? <span className="text-green-300">✓ ΑΑΔΕ OK</span> : <span className="text-red-300">⚠️ ΑΑΔΕ</span>}
                        </div>
                        <div className="p-4">
                            <div className="flex border-b border-gray-100 pb-3 mb-3">
                                <div className="flex-1 text-center border-r border-gray-100">
                                    <div className="text-xs text-gray-400 font-bold">ΑΦΙΞΗ</div>
                                    <div className="text-base font-black text-green-700">{b.checkindate || '-'}</div>
                                    <div className="text-xs text-gray-500">{b.ischeckinunknown ? 'Άγνωστη' : b.checkintime}</div>
                                </div>
                                <div className="flex-1 text-center">
                                    <div className="text-xs text-gray-400 font-bold">ΑΝΑΧΩΡΗΣΗ</div>
                                    <div className="text-base font-black text-red-700">{b.checkoutdate || '-'}</div>
                                    <div className="text-xs text-gray-500">{b.ischeckoutunknown ? 'Άγνωστη' : b.checkouttime}</div>
                                </div>
                            </div>
                            <div className="mb-3">
                                <div className="font-bold text-xl text-gray-800">👤 {b.guestname}</div>
                                <div className="text-sm text-gray-600 mt-2 bg-gray-50 p-2 rounded">
                                    <div className="flex justify-between items-center">
                                        <span><strong>📄 {b.idtype}:</strong> {b.guestid || <span className="text-red-500 font-bold">ΕΚΚΡΕΜΕΙ</span>}</span>
                                        {!b.guestid && <button onClick={()=>{setQuickCheckInBooking(b); setQuickId('');}} className="bg-yellow-400 text-yellow-900 px-2 py-1 rounded text-xs font-bold shadow-sm">Γρήγορο Check-In</button>}
                                    </div>
                                    <div className="mt-1"><strong>🌍 Χώρα:</strong> {b.country || '-'}</div>
                                </div>
                            </div>
                            <div className="flex justify-between p-2 rounded items-center bg-blue-50/50 mb-3 border border-blue-100/40">
                                <span className="font-bold text-gray-700 text-sm">👥 {b.pax} Άτομα</span>
                                {b.pets && <span className="text-xs font-bold px-2 py-1 rounded bg-orange-100 text-orange-700">🐶 Κατοικίδιο</span>}
                            </div>
                            {b.notes && <div className="mb-3 p-2 bg-yellow-50 text-xs text-yellow-800 rounded"><strong>📝</strong> {b.notes}</div>}
                            <div className="mt-3 p-3 rounded flex justify-between items-center bg-green-50 border border-green-100">
                                <span className="font-bold text-xl text-green-700">💶 {b.price} €</span>
                                <div className="flex gap-4">
                                    <button onClick={()=>openEditForm(b)} className="text-blue-500 text-xl">✏️</button>
                                    {role === 'admin' && <button onClick={()=>deleteBooking(b.id)} className="text-red-500 text-xl">🗑️</button>}
                                </div>
                            </div>
                        </div>
                    </div>
                ));
            };

            const renderStats = () => {
                const yearBookings = bookings.filter(b => b.checkindate.startsWith(currentDate.getFullYear().toString()));
                let totalRev = 0; let totalNights = 0; let totalPax = 0; let petsCount = 0; let pax2 = 0; let pax3 = 0;
                let nationalities = {};
                
                yearBookings.forEach(b => {
                    totalRev += b.price;
                    totalPax += b.pax;
                    if(b.pets) petsCount++;
                    if(b.pax === 2) pax2++;
                    if(b.pax === 3) pax3++;
                    const n = getNights(b.checkindate, b.checkoutdate);
                    totalNights += n;
                    nationalities[b.country] = (nationalities[b.country] || 0) + 1;
                });

                const avgNightRate = totalNights > 0 ? (totalRev / totalNights).toFixed(2) : 0;
                const totalDaysInYear = 365;
                const occRateYear = ((totalNights / totalDaysInYear) * 100).toFixed(1);

                return (
                    <div className="bg-white rounded-xl shadow-md p-4 space-y-4">
                        <div className="flex justify-between items-center mb-2">
                            <button onClick={() => setCurrentDate(new Date(currentDate.getFullYear() - 1, 0, 1))} className="text-xl">⬅️</button>
                            <h3 className="font-bold text-xl text-blue-900">Στατιστικά {currentDate.getFullYear()}</h3>
                            <button onClick={() => setCurrentDate(new Date(currentDate.getFullYear() + 1, 0, 1))} className="text-xl">➡️</button>
                        </div>

                        <div className="grid grid-cols-2 gap-2">
                            <div className="bg-green-50 p-3 rounded border border-green-100 text-center">
                                <div className="text-xs text-gray-500 font-bold">ΣΥΝΟΛΙΚΑ ΕΣΟΔΑ</div>
                                <div className="text-xl font-black text-green-700">€{totalRev}</div>
                            </div>
                            <div className="bg-blue-50 p-3 rounded border border-blue-100 text-center">
                                <div className="text-xs text-gray-500 font-bold">ΜΕΣΗ ΤΙΜΗ / ΒΡΑΔΥ</div>
                                <div className="text-xl font-black text-blue-700">€{avgNightRate}</div>
                            </div>
                        </div>

                        <div className="grid grid-cols-2 gap-2">
                            <div className="bg-gray-50 p-3 rounded border border-gray-200 text-center">
                                <div className="text-xs text-gray-500 font-bold">ΚΡΑΤΗΣΕΙΣ</div>
                                <div className="text-xl font-black text-gray-700">{yearBookings.length}</div>
                            </div>
                            <div className="bg-gray-50 p-3 rounded border border-gray-200 text-center">
                                <div className="text-xs text-gray-500 font-bold">ΕΠΙΣΚΕΠΤΕΣ (PAX)</div>
                                <div className="text-xl font-black text-gray-700">{totalPax}</div>
                            </div>
                        </div>

                        <div className="bg-yellow-50 p-3 rounded border border-yellow-100 flex justify-between items-center">
                            <div className="text-sm"><strong>Πληρότητα Έτους:</strong> {totalNights} μέρες</div>
                            <div className="font-bold text-yellow-800">{occRateYear}%</div>
                        </div>

                        <div className="grid grid-cols-3 gap-2 text-center">
                            <div className="bg-white border rounded p-2"><div className="text-xs text-gray-400">2 Άτομα</div><div className="font-bold">{pax2}</div></div>
                            <div className="bg-white border rounded p-2"><div className="text-xs text-gray-400">3 Άτομα</div><div className="font-bold">{pax3}</div></div>
                            <div className="bg-white border rounded p-2"><div className="text-xs text-gray-400">Κατοικίδια</div><div className="font-bold">{petsCount}</div></div>
                        </div>

                        <div>
                            <h4 className="font-bold text-sm text-gray-700 mb-2 border-b pb-1">Εθνικότητες</h4>
                            <div className="flex flex-wrap gap-2">
                                {Object.keys(nationalities).length > 0 ? Object.entries(nationalities).map(([c, count]) => (
                                    <span key={c} className="bg-gray-100 text-xs font-bold px-2 py-1 rounded">{c || 'Άγνωστη'}: {count}</span>
                                )) : <span className="text-xs text-gray-400">Δεν υπάρχουν δεδομένα</span>}
                            </div>
                        </div>
                    </div>
                );
            };

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const startDay = (new Date(year, month, 1).getDay() + 6) % 7; 
            
            const calendarDays = Array(startDay).fill(null).concat([...Array(daysInMonth).keys()].map(i => i + 1));

            if (authStep === 'LOGIN') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-blue-50">
                        <div className="bg-white p-8 rounded-xl shadow-lg w-full max-w-md text-center">
                            <h1 className="text-3xl font-bold text-blue-900 mb-6">Airbnb Manager Pro</h1>
                            <input className="w-full p-3 border border-gray-300 rounded mb-4" placeholder="Όνομα Χρήστη" value={username} onChange={e=>setUsername(e.target.value)} />
                            <input className="w-full p-3 border border-gray-300 rounded mb-6" placeholder="Κωδικός" type="password" value={password} onChange={e=>setPassword(e.target.value)} />
                            <button className="w-full bg-blue-600 text-white font-bold p-3 rounded hover:bg-blue-700" onClick={handleLogin}>Είσοδος</button>
                        </div>
                    </div>
                );
            }

            if (showForm) {
                return (
                    <div className="min-h-screen p-4 pb-20 bg-gray-100">
                        <div className="max-w-md mx-auto bg-white p-6 rounded-xl shadow">
                            <h2 className="text-xl font-bold text-blue-900 mb-4">{editingId ? '✏️ Επεξεργασία' : '📝 Νέα Κράτηση'}</h2>
                            <label className="block text-sm font-bold mt-3">Ονοματεπώνυμο *</label>
                            <input className="w-full p-2 border rounded mt-1" value={guestname} onChange={e=>setGuestname(e.target.value)} />
                            <div className="flex gap-2 mt-3">
                                <div className="w-1/3"><label className="block text-sm font-bold">Έγγραφο</label><input className="w-full p-2 border rounded mt-1" value={idtype} onChange={e=>setIdtype(e.target.value)} /></div>
                                <div className="w-2/3"><label className="block text-sm font-bold">Αριθμός</label><input className="w-full p-2 border rounded mt-1" value={guestid} onChange={e=>setGuestid(e.target.value)} /></div>
                            </div>
                            <label className="block text-sm font-bold mt-3">Χώρα</label>
                            <input className="w-full p-2 border rounded mt-1" value={country} onChange={e=>setCountry(e.target.value)} />
                            
                            <hr className="my-4" />
                            <label className="block text-sm font-bold">Άφιξη *</label>
                            <input className="w-full p-2 border rounded mt-1" type="date" value={checkindate} onChange={e=>setCheckindate(e.target.value)} />
                            {!ischeckinunknown && <input className="w-full p-2 border rounded mt-1" type="time" value={checkintime} onChange={e=>setCheckintime(e.target.value)} />}
                            <div className="mt-1"><input type="checkbox" checked={ischeckinunknown} onChange={e=>setIscheckinunknown(e.target.checked)}/> <span className="text-xs">Άγνωστη ώρα</span></div>
                            
                            <label className="block text-sm font-bold mt-3">Αναχώρηση *</label>
                            <input className="w-full p-2 border rounded mt-1" type="date" value={checkoutdate} onChange={e=>setCheckoutdate(e.target.value)} />
                            {!ischeckoutunknown && <input className="w-full p-2 border rounded mt-1" type="time" value={checkouttime} onChange={e=>setCheckouttime(e.target.value)} />}
                            <div className="mt-1"><input type="checkbox" checked={ischeckoutunknown} onChange={e=>setIscheckoutunknown(e.target.checked)}/> <span className="text-xs">Άγνωστη ώρα</span></div>
                            
                            <hr className="my-4" />
                            <div className="flex gap-2">
                                <div className="w-1/2"><label className="block text-sm font-bold">Ποσό (€)</label><input className="w-full p-2 border rounded mt-1" type="number" value={price} onChange={e=>setPrice(e.target.value)} /></div>
                                <div className="w-1/2"><label className="block text-sm font-bold">Άτομα</label><input className="w-full p-2 border rounded mt-1" type="number" value={pax} onChange={e=>setPax(e.target.value)} /></div>
                            </div>
                            <div className="mt-3"><input type="checkbox" checked={pets} onChange={e=>setPets(e.target.checked)}/> <span className="font-bold">Κατοικίδιο</span></div>
                            <div className="mt-2"><input type="checkbox" checked={isaadecomplete} onChange={e=>setIsaadecomplete(e.target.checked)}/> <span className="font-bold">ΑΑΔΕ OK</span></div>
                            <label className="block text-sm font-bold mt-3">Σημειώσεις</label>
                            <textarea className="w-full p-2 border rounded mt-1" rows="2" value={notes} onChange={e=>setNotes(e.target.value)}></textarea>
                            
                            <button className="w-full bg-blue-600 text-white font-bold p-3 rounded mt-6" onClick={saveBooking}>💾 Αποθήκευση</button>
                            <button className="w-full bg-gray-500 text-white font-bold p-3 rounded mt-2" onClick={()=>setShowForm(false)}>Ακύρωση</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gray-100 pb-20">
                    <div className="p-4 text-white flex justify-between items-center bg-blue-900 shadow-md">
                        <div className="font-bold text-lg">🏠 Airbnb Pro</div>
                        <div className="flex gap-4 items-center">
                            <button onClick={()=>setActiveTab('settings')} className="text-2xl">⚙️</button>
                            <button className="bg-red-500 px-3 py-1 rounded font-bold text-sm" onClick={()=>setAuthStep('LOGIN')}>Έξοδος</button>
                        </div>
                    </div>

                    <div className="flex overflow-x-auto bg-white shadow-sm border-b border-gray-200 hide-scrollbar justify-between">
                        {['current', 'upcoming', 'past', 'calendar', 'stats'].map(tab => (
                            <button key={tab} onClick={()=>setActiveTab(tab)} className={`flex-1 px-2 py-3 text-xs font-bold whitespace-nowrap text-center ${activeTab===tab?'text-blue-600 border-b-2 border-blue-600':'text-gray-500'}`}>
                                {tab==='current'?'Τρέχουσες':tab==='upcoming'?'Επερχόμενες':tab==='past'?'Προηγούμενες':tab==='calendar'?'Ημερολόγιο':'Στατιστικά'}
                            </button>
                        ))}
                    </div>

                    <div className="p-4 max-w-md mx-auto">
                        
                        {['current', 'upcoming', 'past'].includes(activeTab) && (
                            <div className="mb-4 flex gap-2">
                                {role === 'admin' && <button className="flex-1 bg-blue-600 text-white font-bold p-3 rounded-lg shadow-md" onClick={()=>{setEditingId(null); setShowForm(true);}}>➕ Νέα</button>}
                                <button className="flex-1 bg-green-600 text-white font-bold p-3 rounded-lg shadow-md" onClick={exportToExcel}>📊 Excel</button>
                            </div>
                        )}

                        {activeTab === 'current' && renderBookingsList(currentBookings)}
                        {activeTab === 'upcoming' && renderBookingsList(upcomingBookings)}
                        {activeTab === 'past' && renderBookingsList(pastBookings)}
                        {activeTab === 'stats' && renderStats()}

                        {activeTab === 'calendar' && (
                            <div className="bg-white rounded-xl shadow-md p-4">
                                <div className="flex justify-between items-center mb-4 bg-gray-50 p-2 rounded">
                                    <button onClick={() => setCurrentDate(new Date(year, month - 1, 1))} className="text-xl px-2">⬅️</button>
                                    <h3 className="font-bold text-lg text-blue-900">{MONTH_NAMES[month]} {year}</h3>
                                    <button onClick={() => setCurrentDate(new Date(year, month + 1, 1))} className="text-xl px-2">➡️</button>
                                </div>
                                
                                <div className="grid grid-cols-7 gap-1 text-center text-xs font-bold text-gray-500 mb-2">
                                    <div>ΔΕ</div><div>ΤΡ</div><div>ΤΕ</div><div>ΠΕ</div><div>ΠΑ</div><div>ΣΑ</div><div>ΚΥ</div>
                                </div>
                                
                                <div className="grid grid-cols-7 gap-1">
                                    {calendarDays.map((day, index) => {
                                        if(!day) return <div key={index} className="h-14 bg-gray-50 border border-gray-100 rounded"></div>;
                                        
                                        const dateStr = `${year}-${String(month+1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                                        const inBs = bookings.filter(b => b.checkindate === dateStr);
                                        const outBs = bookings.filter(b => b.checkoutdate === dateStr);
                                        const stayBs = bookings.filter(b => b.checkindate < dateStr && b.checkoutdate > dateStr);
                                        
                                        let displayMode = 'none';
                                        let bgColor = 'bg-white';
                                        let text = '';
                                        let targetBooking = null;

                                        if(inBs.length && outBs.length) {
                                            displayMode = 'change'; bgColor = 'bg-gradient-to-r from-red-100 to-green-100 border-yellow-300'; text = '🔄 Αλλαγή'; targetBooking = inBs[0];
                                        } else if(stayBs.length) {
                                            displayMode = 'stay'; bgColor = 'bg-blue-100 border-blue-300'; text = stayBs[0].guestname.split(' ')[0]; targetBooking = stayBs[0];
                                        } else if(inBs.length) {
                                            displayMode = 'in'; bgColor = 'bg-green-100 border-green-300'; text = 'Άφιξη: ' + inBs[0].guestname.split(' ')[0]; targetBooking = inBs[0];
                                        } else if(outBs.length) {
                                            displayMode = 'out'; bgColor = 'bg-red-50 border-red-200'; text = 'Αναχ: ' + outBs[0].guestname.split(' ')[0]; targetBooking = outBs[0];
                                        }

                                        return (
                                            <div key={index} onClick={() => targetBooking && setSelectedCalendarBooking(targetBooking)} className={`h-14 border rounded p-1 flex flex-col justify-start items-center relative ${bgColor} cursor-pointer hover:opacity-80`}>
                                                <span className="text-xs font-bold text-gray-700">{day}</span>
                                                {displayMode !== 'none' && <div className="text-[9px] text-black bg-white/70 rounded px-1 w-full text-center mt-1 font-bold truncate leading-tight shadow-sm">{text}</div>}
                                            </div>
                                        )
                                    })}
                                </div>
                            </div>
                        )}

                        {activeTab === 'settings' && (
                            <div className="bg-white rounded-xl shadow-md p-6 border border-gray-200">
                                <h3 className="font-bold text-lg mb-4">⚙️ Ρυθμίσεις</h3>
                                <label className="block text-sm font-bold mt-3">Νέο Όνομα</label><input id="newU" className="w-full p-2 border rounded mt-1" defaultValue={role === 'admin' ? adminCreds.u : staffCreds.u} />
                                <label className="block text-sm font-bold mt-3">Νέος Κωδικός</label><input id="newP" type="password" className="w-full p-2 border rounded mt-1" defaultValue={role === 'admin' ? adminCreds.p : staffCreds.p} />
                                <button className="w-full bg-blue-800 text-white font-bold p-3 rounded mt-6" onClick={() => handleUpdateCreds(document.getElementById('newU').value, document.getElementById('newP').value)}>Αποθήκευση</button>
                            </div>
                        )}
                    </div>

                    {/* MODAL: Calendar Info */}
                    {selectedCalendarBooking && (
                        <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50">
                            <div className="bg-white p-5 rounded-xl w-full max-w-sm">
                                <h3 className="font-bold text-lg text-blue-900 border-b pb-2 mb-3">Λεπτομέρειες Κράτησης</h3>
                                <p><strong>👤 Πελάτης:</strong> {selectedCalendarBooking.guestname}</p>
                                <p className="mt-1"><strong>🟢 Άφιξη:</strong> {selectedCalendarBooking.checkindate}</p>
                                <p className="mt-1"><strong>🔴 Αναχώρηση:</strong> {selectedCalendarBooking.checkoutdate}</p>
                                <p className="mt-1"><strong>💶 Ποσό:</strong> {selectedCalendarBooking.price}€</p>
                                <div className="mt-5 flex gap-2">
                                    <button className="flex-1 bg-blue-600 text-white p-2 rounded font-bold" onClick={()=>{openEditForm(selectedCalendarBooking); setSelectedCalendarBooking(null);}}>Επεξεργασία</button>
                                    <button className="flex-1 bg-gray-300 text-gray-800 p-2 rounded font-bold" onClick={()=>setSelectedCalendarBooking(null)}>Κλείσιμο</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL: Quick Check-In */}
                    {quickCheckInBooking && (
                        <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50">
                            <div className="bg-white p-6 rounded-xl w-full max-w-sm text-center">
                                <h3 className="font-black text-xl text-yellow-600 mb-2">Γρήγορο Check-In</h3>
                                <p className="font-bold text-gray-700 mb-4">{quickCheckInBooking.guestname}</p>
                                <label className="block text-sm font-bold text-gray-600 text-left">Αριθμός ({quickCheckInBooking.idtype})</label>
                                <input className="w-full p-3 border border-gray-400 rounded mt-1 mb-5 text-lg font-bold text-center" value={quickId} onChange={e=>setQuickId(e.target.value)} placeholder="Εισάγετε εδώ..." />
                                <button className="w-full bg-blue-600 text-white font-bold py-3 rounded text-lg mb-2 shadow-md" onClick={saveQuickCheckIn}>Αποθήκευση</button>
                                <button className="w-full bg-gray-200 text-gray-700 font-bold py-3 rounded" onClick={()=>setQuickCheckInBooking(null)}>Ακύρωση</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</body>
</html>
