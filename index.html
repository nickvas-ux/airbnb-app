<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airbnb Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100">
    <div id="root">
        <h2 style="text-align:center; margin-top: 50px; font-family: sans-serif; color: #1E3A8A;">Φόρτωση συστήματος...</h2>
    </div>

    <script type="text/babel">
        const { useState } = React;

        const SUPABASE_URL = 'https://lcxrcoyjykvcladfkgus.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxjeHJjb3lqeWt2Y2xhZGZrZ3VzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxMTg0NDcsImV4cCI6MjA5NDY5NDQ0N30.yA8x4RAbpKa6WM69v3r2YPWlJI8hhbnLnUA05pajtaA';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function App() {
            const [authStep, setAuthStep] = useState('LOGIN');
            const [role, setRole] = useState(null);
            const [bookings, setBookings] = useState([]);
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [showAddForm, setShowAddForm] = useState(false);

            const [guestName, setGuestName] = useState('');
            const [idType, setIdType] = useState('ΑΦΜ');
            const [guestId, setGuestId] = useState('');
            const [country, setCountry] = useState('Ελλάδα');
            const [checkIn, setCheckIn] = useState('');
            const [checkOut, setCheckOut] = useState('');
            const [price, setPrice] = useState('');
            const [pax, setPax] = useState('2');
            const [pets, setPets] = useState('Όχι');

            const fetchBookings = () => {
                supabaseClient.from('bookings').select('*').order('checkInDate', { ascending: true })
                .then(response => {
                    if (response.data) setBookings(response.data);
                })
                .catch(err => console.log("Σφάλμα σύνδεσης"));
            };

            const handleLogin = () => {
                const u = username.trim().toLowerCase();
                const p = password.trim();
                if (u === 'admin' && p === 'admin') {
                    setRole('admin'); setAuthStep('APP'); fetchBookings();
                } else if (u === 'staff' && p === 'staff') {
                    setRole('staff'); setAuthStep('APP'); fetchBookings();
                } else {
                    alert('Λάθος Στοιχεία. Βάλτε admin και admin ή staff και staff');
                }
            };

            const saveBooking = () => {
                if (!guestName || !checkIn || !checkOut) return alert("Το Όνομα, η Άφιξη και η Αναχώρηση είναι υποχρεωτικά.");
                supabaseClient.from('bookings').insert([{
                    guestName: guestName, 
                    checkInDate: checkIn, 
                    checkOutDate: checkOut, 
                    price: Number(price)||0,
                    idType: idType, 
                    guestId: guestId, 
                    country: country, 
                    pax: Number(pax)||2, 
                    pets: pets.toLowerCase() === 'ναι'
                }]).then(response => {
                    if (!response.error) {
                        setShowAddForm(false);
                        setGuestName(''); setGuestId(''); setCheckIn(''); setCheckOut(''); setPrice('');
                        fetchBookings();
                        alert("Επιτυχία! Η κράτηση συγχρονίστηκε.");
                    } else alert("Σφάλμα: " + response.error.message);
                }).catch(err => alert("Αποτυχία δικτύου"));
            };

            const deleteBooking = (id) => {
                if(window.confirm("Σίγουρα θέλετε να διαγράψετε την κράτηση;")) {
                    supabaseClient.from('bookings').delete().eq('id', id)
                    .then(() => fetchBookings());
                }
            };

            if (authStep === 'LOGIN') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4" style={{backgroundColor: '#EFF6FF'}}>
                        <div className="bg-white p-8 rounded-xl shadow-lg w-full max-w-md text-center">
                            <div style={{fontSize: '50px', marginBottom: '10px'}}>🔒</div>
                            <h1 className="text-3xl font-bold text-blue-900 mb-2">Airbnb Manager</h1>
                            <p className="text-gray-500 mb-6">Σύστημα Διαχείρισης Κρατήσεων</p>
                            <input className="w-full p-3 border border-gray-300 rounded mb-4" placeholder="Όνομα Χρήστη (admin ή staff)" value={username} onChange={e=>setUsername(e.target.value)} />
                            <input className="w-full p-3 border border-gray-300 rounded mb-6" placeholder="Κωδικός" type="password" value={password} onChange={e=>setPassword(e.target.value)} />
                            <button className="w-full bg-blue-600 text-white font-bold p-3 rounded hover:bg-blue-700" onClick={handleLogin}>Είσοδος Συστήματος</button>
                        </div>
                    </div>
                );
            }

            if (showAddForm) {
                return (
                    <div className="min-h-screen p-4 pb-20" style={{backgroundColor: '#F3F4F6'}}>
                        <div className="max-w-md mx-auto bg-white p-6 rounded-xl shadow">
                            <h2 className="text-xl font-bold text-blue-900 mb-4">📝 Νέα Κράτηση</h2>
                            
                            <label className="block text-sm font-bold text-gray-700 mt-3">Ονοματεπώνυμο *</label>
                            <input className="w-full p-2 border border-gray-300 rounded mt-1" placeholder="π.χ. Νίκος Παππάς" value={guestName} onChange={e=>setGuestName(e.target.value)} />

                            <label className="block text-sm font-bold text-gray-700 mt-3">Τύπος Εγγράφου</label>
                            <input className="w-full p-2 border border-gray-300 rounded mt-1" value={idType} onChange={e=>setIdType(e.target.value)} />

                            <label className="block text-sm font-bold text-gray-700 mt-3">Αριθμός Εγγράφου / ΑΦΜ</label>
                            <input className="w-full p-2 border border-gray-300 rounded mt-1" placeholder="ΑΦΜ ή Διαβατήριο" value={guestId} onChange={e=>setGuestId(e.target.value)} />

                            <label className="block text-sm font-bold text-gray-700 mt-3">Χώρα</label>
                            <input className="w-full p-2 border border-gray-300 rounded mt-1" value={country} onChange={e=>setCountry(e.target.value)} />

                            <label className="block text-sm font-bold text-gray-700 mt-3">Άφιξη (ΕΤΟΣ-ΜΗΝΑΣ-ΜΕΡΑ) *</label>
                            <input className="w-full p-2 border border-gray-300 rounded mt-1" type="date" value={checkIn} onChange={e=>setCheckIn(e.target.value)} />

                            <label className="block text-sm font-bold text-gray-700 mt-3">Αναχώρηση (ΕΤΟΣ-ΜΗΝΑΣ-ΜΕΡΑ) *</label>
                            <input className="w-full p-2 border border-gray-300 rounded mt-1" type="date" value={checkOut} onChange={e=>setCheckOut(e.target.value)} />

                            <label className="block text-sm font-bold text-gray-700 mt-3">Συνολικό Ποσό (€)</label>
                            <input className="w-full p-2 border border-gray-300 rounded mt-1" type="number" value={price} onChange={e=>setPrice(e.target.value)} />

                            <label className="block text-sm font-bold text-gray-700 mt-3">Άτομα</label>
                            <input className="w-full p-2 border border-gray-300 rounded mt-1" type="number" value={pax} onChange={e=>setPax(e.target.value)} />

                            <label className="block text-sm font-bold text-gray-700 mt-3">Κατοικίδιο (Ναι ή Όχι)</label>
                            <input className="w-full p-2 border border-gray-300 rounded mt-1" value={pets} onChange={e=>setPets(e.target.value)} />

                            <button className="w-full bg-blue-600 text-white font-bold p-3 rounded mt-6" onClick={saveBooking}>🔒 Οριστική Αποθήκευση</button>
                            <button className="w-full bg-gray-500 text-white font-bold p-3 rounded mt-2" onClick={()=>setShowAddForm(false)}>Ακύρωση</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen" style={{backgroundColor: '#F3F4F6'}}>
                    <div className="p-4 text-white flex justify-between items-center" style={{backgroundColor: '#1E3A8A'}}>
                        <div>
                            <div className="text-xs" style={{color: '#93C5FD'}}>Συνδεδεμένος Χρήστης:</div>
                            <div className="font-bold">{role === 'admin' ? '👑 Διαχειριστής' : '📋 Υπάλληλος'}</div>
                        </div>
                        <button className="bg-red-500 px-3 py-1 rounded font-bold text-white" onClick={()=>setAuthStep('LOGIN')}>Έξοδος</button>
                    </div>

                    <div className="p-4 flex gap-2 rounded-b-2xl" style={{backgroundColor: '#1E3A8A'}}>
                        <button className="flex-1 bg-white font-bold p-3 rounded-lg shadow flex justify-center items-center gap-2" style={{color: '#1E3A8A'}} onClick={()=>setShowAddForm(true)}>
                            <span style={{fontSize: '18px'}}>➕</span> Νέα Κράτηση
                        </button>
                        <button className="flex-1 bg-green-500 text-white font-bold p-3 rounded-lg shadow flex justify-center items-center gap-2" onClick={()=>alert("Ο συγχρονισμός λειτουργεί σωστά. Όλα είναι στο Cloud.")}>
                            <span style={{fontSize: '18px'}}>📊</span> Βάση OK
                        </button>
                    </div>

                    <div className="p-4 pb-20 max-w-md mx-auto">
                        {bookings.length === 0 ? <p className="text-center text-gray-500 mt-10">Δεν υπάρχουν κρατήσεις ακόμα.</p> : null}
                        {bookings.map(b => (
                            <div key={b.id} className="bg-white rounded-xl shadow-md mb-4 overflow-hidden">
                                <div className="text-white text-xs font-bold text-center p-1 tracking-wider" style={{backgroundColor: '#4B5563'}}>ΕΠΙΒΕΒΑΙΩΜΕΝΗ ΚΡΑΤΗΣΗ</div>
                                <div className="p-4">
                                    <div className="flex border-b border-gray-100 pb-3 mb-3">
                                        <div className="flex-1 text-center border-r border-gray-100">
                                            <div className="text-xs text-gray-400 font-bold">ΑΦΙΞΗ</div>
                                            <div className="text-lg font-black text-green-700">{b.checkInDate || '-'}</div>
                                        </div>
                                        <div className="flex-1 text-center">
                                            <div className="text-xs text-gray-400 font-bold">ΑΝΑΧΩΡΗΣΗ</div>
                                            <div className="text-lg font-black text-red-700">{b.checkOutDate || '-'}</div>
                                        </div>
                                    </div>
                                    
                                    <div className="mb-3">
                                        <div className="font-bold text-lg text-gray-800">👤 {b.guestName}</div>
                                        <div className="text-sm text-gray-500 mt-1">📄 {b.idType}: {b.guestId || '-'}</div>
                                        <div className="text-sm text-gray-500">🌍 Χώρα: {b.country || '-'}</div>
                                    </div>

                                    <div className="flex justify-between p-2 rounded items-center" style={{backgroundColor: '#F9FAFB'}}>
                                        <span className="font-bold text-gray-700">👥 {b.pax} Άτομα</span>
                                        {b.pets && <span className="text-xs font-bold px-2 py-1 rounded" style={{backgroundColor: '#FFEDD5', color: '#EA580C'}}>🐶 Κατοικίδιο</span>}
                                    </div>

                                    <div className="mt-3 p-3 rounded flex justify-between items-center" style={{backgroundColor: '#F0FDF4'}}>
                                        {role === 'admin' ? (
                                            <>
                                                <span className="font-bold text-lg text-green-700">💶 {b.price} €</span>
                                                <button onClick={()=>deleteBooking(b.id)} className="text-red-500" style={{fontSize: '22px'}}>🗑️</button>
                                            </>
                                        ) : (
                                            <span className="text-xs italic text-gray-500">🔒 Τα οικονομικά βλέπει ο Διαχειριστής.</span>
                                        )}
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
